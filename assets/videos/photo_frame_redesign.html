
<style>
  .pf-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 0;
  }
  .pf-outer {
    position: relative;
    width: 320px;
    height: 380px;
  }
  .pf-grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    border-radius: 4px;
  }
  .pf-corner {
    position: absolute;
    width: 22px; height: 22px;
    z-index: 5;
  }
  .pf-corner svg { display: block; }
  .pf-corner.tl { top: 0; left: 0; }
  .pf-corner.tr { top: 0; right: 0; transform: scaleX(-1); }
  .pf-corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .pf-corner.br { bottom: 0; right: 0; transform: scale(-1); }
  .pf-accent-bar {
    position: absolute;
    left: 0; bottom: -6px;
    width: 60px; height: 2px;
    background: #00e5ff;
    z-index: 6;
  }
  .pf-accent-bar-v {
    position: absolute;
    right: -6px; top: 0;
    width: 2px; height: 60px;
    background: #00e5ff;
    z-index: 6;
  }
  .pf-scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(0,229,255,0.5) 40%, rgba(0,229,255,0.5) 60%, transparent 100%);
    z-index: 7;
    animation: scan 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes scan {
    0%   { top: 5%;  opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 95%; opacity: 0; }
  }
  .pf-img-container {
    position: absolute;
    inset: 16px;
    overflow: hidden;
    border-radius: 2px;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .pf-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    filter: grayscale(1) contrast(1.1);
    mix-blend-mode: luminosity;
  }
  .pf-img-tint {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(8,12,20,0.7) 0%,
      rgba(8,12,20,0.15) 40%,
      transparent 70%
    );
    pointer-events: none;
  }
  .pf-label {
    position: absolute;
    bottom: 20px;
    left: 24px;
    z-index: 6;
  }
  .pf-label-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0,229,255,0.85);
    display: block;
  }
  .pf-label-role {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    display: block;
    margin-top: 2px;
  }
  .pf-badge {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 46px; height: 46px;
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 6;
    background: rgba(8,12,20,0.6);
  }
  .pf-badge-inner {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(0,229,255,0.7);
    text-align: center;
    line-height: 1.3;
  }
  .pf-dot-row {
    position: absolute;
    bottom: -18px;
    right: 0;
    display: flex; gap: 5px; z-index: 6;
  }
  .pf-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(0,229,255,0.35);
  }
  .pf-dot.active { background: rgba(0,229,255,0.9); }
</style>
