<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth  || 320;
      canvas.height = window.innerHeight || 380;
      initNodes();
    }

    const ACCENT_R = 0, ACCENT_G = 229, ACCENT_B = 255;
    const BG = 'rgba(8,12,20,0.96)';

    let nodes = [];
    let hexagons = [];

    function initNodes() {
      const W = canvas.width, H = canvas.height;
      const count = Math.floor((W * H) / 4000);

      nodes = Array.from({ length: Math.max(18, Math.min(count, 36)) }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.32,
        vy: (Math.random() - 0.5) * 0.32,
        r: Math.random() * 1.4 + 0.7,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 0.018 + Math.random() * 0.018,
      }));

      hexagons = Array.from({ length: 5 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 16 + Math.random() * 28,
        rot: Math.random() * Math.PI,
        rotSpeed: (Math.random() - 0.5) * 0.0035,
        alpha: 0.035 + Math.random() * 0.065,
      }));
    }

    function hexPath(x, y, r, rot) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = rot + (Math.PI / 3) * i;
        const px = x + r * Math.cos(a);
        const py = y + r * Math.sin(a);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    let tick = 0;

    function draw() {
      const W = canvas.width, H = canvas.height;

      /* Background */
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      /* Dot grid */
      ctx.strokeStyle = 'rgba(0,229,255,0.05)';
      ctx.lineWidth = 0.5;
      const step = 28;
      for (let x = 0; x < W; x += step) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += step) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      /* Rotating hexagons */
      for (const h of hexagons) {
        h.rot += h.rotSpeed;
        hexPath(h.x, h.y, h.size, h.rot);
        ctx.strokeStyle = `rgba(0,229,255,${h.alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      /* Connection lines between nearby nodes */
      const MAX_DIST = 95;
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MAX_DIST) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(${ACCENT_R},${ACCENT_G},${ACCENT_B},${(1 - dist / MAX_DIST) * 0.22})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      /* Nodes */
      for (const n of nodes) {
        n.pulse += n.pulseSpeed;
        const glow = 0.6 + Math.sin(n.pulse) * 0.4;

        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ACCENT_R},${ACCENT_G},${ACCENT_B},${glow * 0.85})`;
        ctx.fill();

        /* Ripple on bright pulse */
        const s = Math.sin(n.pulse);
        if (s > 0.72) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * 3.5, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${ACCENT_R},${ACCENT_G},${ACCENT_B},${(s - 0.72) * 0.45})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }

        /* Move + bounce */
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      }

      /* Sweep beam */
      const beamY = (tick * 0.55) % (H + 20) - 10;
      const grad = ctx.createLinearGradient(0, beamY - 10, 0, beamY + 10);
      grad.addColorStop(0, 'transparent');
      grad.addColorStop(0.5, `rgba(${ACCENT_R},${ACCENT_G},${ACCENT_B},0.055)`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(0, beamY - 10, W, 20);

      tick++;
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
